<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>POL-IN-ONE</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="POL-IN-ONE">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="fonts/fonts.css">
<style>
  :root{
    --bg:#0d0d0d; --panel:#1a1a1a; --gold:#C9A84C;
    --gold-dim:rgba(201,168,76,0.13); --gold-b:rgba(201,168,76,0.3);
    --cream:#f0ede8; --muted:#888; --line:#222;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg); color:var(--cream); font-family:'DM Sans',sans-serif;
    min-height:100vh; padding:28px 16px calc(28px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center;
  }
  .wrap{ width:100%; max-width:440px; }
  header{
    text-align:center; padding:12px 0 22px; margin-bottom:22px;
    border-bottom:1px solid var(--gold-b);
  }
  .logo{
    font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,13vw,58px);
    letter-spacing:4px; line-height:1; color:var(--cream);
  }
  .logo span{ color:var(--gold); }
  .tagline{
    margin-top:8px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);
  }
  .tiles{ display:flex; flex-direction:column; gap:13px; }
  .tile{
    display:flex; align-items:center; gap:15px; text-decoration:none;
    background:var(--panel); border:1px solid var(--line); border-radius:15px;
    padding:17px 15px; transition:transform .12s, border-color .15s;
  }
  .tile:active{ transform:scale(0.98); }
  .tile.primary{ border-color:var(--gold-b); }
  .tile-ico{
    width:48px; height:48px; border-radius:13px; background:var(--gold-dim);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .tile-ico svg{ width:27px; height:27px; }
  .tile-txt{ flex:1; min-width:0; }
  .tile-name{
    font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:1.5px; color:var(--cream);
  }
  .tile-sub{ font-size:11.5px; color:var(--muted); margin-top:1px; }
  .tile-arrow{ color:var(--muted); flex-shrink:0; }
  .tile.primary .tile-arrow{ color:var(--gold); }
  .tile-arrow svg{ width:20px; height:20px; }
  .tile.soon{
    border-style:dashed; border-color:#2e2e2e; background:transparent;
  }
  .tile.soon .tile-ico{ background:rgba(255,255,255,0.03); }
  .tile.soon .tile-name{ font-family:'DM Sans',sans-serif; font-size:13px; letter-spacing:0; color:var(--muted); }
  footer{ margin-top:26px; text-align:center; font-size:10px; letter-spacing:1px; color:#3a3a3a; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">POL<span>-IN-</span>ONE</div>
    <div class="tagline">I tuoi strumenti personali</div>
  </header>

  <div class="tiles">

    <a class="tile primary" href="rice-cor/index.html">
      <div class="tile-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18a9 9 0 0 1-18 0z"/><path d="M2 11h20"/><path d="M8 7.5c-.3-1 .6-1.6.6-2.6M12 7.5c-.3-1 .6-1.6.6-2.6M16 7.5c-.3-1 .6-1.6.6-2.6"/></svg>
      </div>
      <div class="tile-txt">
        <div class="tile-name">RICE &amp; COR</div>
        <div class="tile-sub">Meal prep riso · crema di riso</div>
      </div>
      <span class="tile-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
    </a>

    <a class="tile" href="polspresso/index.html">
      <div class="tile-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><path d="M17 10h2a2 2 0 0 1 0 4h-2"/><path d="M8 3.5c0 1-.8 1.5-.8 2.5M11.5 3.5c0 1-.8 1.5-.8 2.5"/></svg>
      </div>
      <div class="tile-txt">
        <div class="tile-name">POLSPRESSO</div>
        <div class="tile-sub">Log shot espresso · analisi</div>
      </div>
      <span class="tile-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
    </a>

    <a class="tile" href="lista-spesa/index.html">
      <div class="tile-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/><path d="M3 4h2l2.4 11.5a1.5 1.5 0 0 0 1.5 1.2h8a1.5 1.5 0 0 0 1.5-1.2L21 7H6"/></svg>
      </div>
      <div class="tile-txt">
        <div class="tile-name">LISTA SPESA</div>
        <div class="tile-sub">Prodotti · preferiti · spesa</div>
      </div>
      <span class="tile-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
    </a>

    <a class="tile" href="packlist/index.html">
      <div class="tile-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="7" width="14" height="13" rx="2"/><path d="M9 7V4h6v3"/><path d="M9 11v5M15 11v5"/></svg>
      </div>
      <div class="tile-txt">
        <div class="tile-name">PACKLIST</div>
        <div class="tile-sub">Checklist valigia vacanza</div>
      </div>
      <span class="tile-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
    </a>

    <div class="tile soon">
      <div class="tile-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <div class="tile-txt">
        <div class="tile-name">Altri moduli in arrivo</div>
      </div>
    </div>

  </div>

  <footer>POL-IN-ONE · dati salvati solo su questo dispositivo</footer>
</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  });
}
</script>
</body>
</html>
