name: Promemoria peso

on:
  # Schedule DISABILITATA: lo scheduling affidabile è passato a Cloudflare Workers (le cron di GitHub saltavano interi blocchi).
  # Resta solo l'invio manuale come riserva.
  workflow_dispatch:        # invio manuale di test
    inputs:
      force:
        description: "Invia subito anche fuori orario (test)"
        type: boolean
        default: true

permissions:
  contents: write            # per salvare il marker anti-doppione

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: push-sender
        run: npm install --no-audit --no-fund
      - name: Send push
        working-directory: push-sender
        run: node send.js
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          REMIND_TIME: ${{ vars.REMIND_TIME }}
          FORCE: ${{ inputs.force }}
      - name: Salva marker (una volta al giorno)
        if: always()
        run: |
          if [ -n "$(git status --porcelain push-sender/.last-sent)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add push-sender/.last-sent
            git commit -m "chore: promemoria peso inviato"
            git push
          else
            echo "Nessun marker da salvare."
          fi
