name: Promemoria peso

on:
  schedule:
    - cron: '*/30 * * * *'   # ogni 30 min; lo script invia solo all'ora scelta (REMIND_TIME) in Italia
  workflow_dispatch:        # invio manuale di test
    inputs:
      force:
        description: "Invia subito anche fuori orario (test)"
        type: boolean
        default: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: push-sender
        run: npm install --no-audit --no-fund
      - name: Send push
        working-directory: push-sender
        run: node send.js
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          REMIND_TIME: ${{ vars.REMIND_TIME }}
          FORCE: ${{ inputs.force }}
